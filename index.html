<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Forms</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/form1.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>

    </header>
    <main>
        <section class="section1">
            <form>
                <h3>Form For Student Info :</h3>

                <div class="form-group">
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" placeholder="First Name">
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" placeholder="Last Name">
                </div>

                <div class="form-group">
                    <label for="fatherName">Father's Name:</label>
                    <input type="text" id="fatherName" placeholder="Father's Name">
                </div>

                <div class="form-group">
                    <label for="motherName">Mother's Name:</label>
                    <input type="text" id="motherName" placeholder="Mother's Name">
                </div>

                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="text" class="phone-code" value="+880"> -
                    <input type="text" class="phone-number" placeholder="Phone Number">
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Email">
                </div>

                <div class="form-group">
                    <label for="birthday">Date of Birth:</label>
                    <input type="date" id="birthday">
                </div>

                <div class="form-group">
                    <label for="presentAddress">Present Address:</label>
                    <textarea id="presentAddress" rows="4" cols="40" placeholder="Enter your full address"></textarea>
                </div>

                <div class="form-group">
                    <label for="permanentAddress">Permanent Address:</label>
                    <textarea id="permanentAddress" rows="4" cols="40" placeholder="Enter your full address"></textarea>
                </div>

                <div class="form-group">
                    <input type="submit" value="Submit">
                </div>

            </form>
        </section>
    </main>
    <footer>

    </footer>



</body>

</html>
